apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-ingestion-api
  namespace: default
  labels:
    app: candidate-ingestion
    component: api
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: candidate-ingestion
      component: api
  template:
    metadata:
      labels:
        app: candidate-ingestion
        component: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/health"
    spec:
      serviceAccountName: candidate-ingestion

      containers:
      - name: api
        image: candidate-ingestion:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: API_PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: candidate-ingestion
              key: database-url
        - name: GCP_PROJECT
          valueFrom:
            configMapKeyRef:
              name: candidate-ingestion
              key: gcp-project
        - name: PUBSUB_TOPIC
          valueFrom:
            configMapKeyRef:
              name: candidate-ingestion
              key: pubsub-topic
        - name: PUBSUB_EMULATOR_HOST
          valueFrom:
            configMapKeyRef:
              name: candidate-ingestion
              key: pubsub-emulator-host
              optional: true

        command: ["./api"]

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - candidate-ingestion
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: candidate-ingestion-api
  namespace: default
  labels:
    app: candidate-ingestion
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: candidate-ingestion
    component: api
