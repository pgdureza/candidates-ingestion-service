apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-ingestion-poller
  namespace: candidate-ingestion-service
  labels:
    app: candidate-ingestion
    component: poller
    version: v1
spec:
  # Single replica - only one instance should poll outbox
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: candidate-ingestion
      component: poller
  template:
    metadata:
      labels:
        app: candidate-ingestion
        component: poller
        version: v1
    spec:
      serviceAccountName: candidate-ingestion

      containers:
        - name: poller
          image: candidate-ingestion:latest
          imagePullPolicy: Always

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: candidate-ingestion
                  key: database-url
            - name: LOG_LEVEL
              value: "info"

          command: ["./poller"]

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
