apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-ingestion-worker
  namespace: candidate-ingestion-service
  labels:
    app: candidate-ingestion
    component: worker
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: candidate-ingestion
      component: worker
  template:
    metadata:
      labels:
        app: candidate-ingestion
        component: worker
        version: v1
    spec:
      serviceAccountName: candidate-ingestion

      containers:
        - name: worker
          image: candidate-ingestion:latest
          imagePullPolicy: Never

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: candidate-ingestion
                  key: database-url
            - name: GCP_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: candidate-ingestion
                  key: gcp-project
            - name: PUBSUB_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: candidate-ingestion
                  key: pubsub-topic
            - name: PUBSUB_EMULATOR_HOST
              valueFrom:
                configMapKeyRef:
                  name: candidate-ingestion
                  key: pubsub-emulator-host
                  optional: true
            - name: WORKER_COUNT
              value: "10"
            - name: WORKER_TIMEOUT
              value: "30s"

          command: ["./worker"]

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - candidate-ingestion
                    - key: component
                      operator: In
                      values:
                        - worker
                topologyKey: kubernetes.io/hostname
