apiVersion: batch/v1
kind: CronJob
metadata:
  name: candidate-ingestion-scheduler
  namespace: candidate-ingestion-service
  labels:
    app: candidate-ingestion
    component: scheduler
spec:
  # Run daily at 2 AM Singapore time
  timeZone: "Asia/Singapore"
  schedule: "0 2 * * *"

  # Keep last 3 successful and failed jobs for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: candidate-ingestion
            component: scheduler
        spec:
          serviceAccountName: candidate-ingestion
          restartPolicy: Never

          containers:
            - name: scheduler
              image: candidate-ingestion:latest
              imagePullPolicy: Always

              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: candidate-ingestion
                      key: database-url
                - name: OUTBOX_RETENTION_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: candidate-ingestion
                      key: outbox-retention-days
                      optional: true
                - name: LOG_LEVEL
                  value: "info"

              command: ["./scheduler"]

              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"

              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL

              volumeMounts:
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: tmp
              emptyDir: {}
