version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: candidates-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: candidates
    command: postgres -c listen_addresses='*' -c password_encryption='scram-sha-256'
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d candidates"]
      interval: 10s
      timeout: 5s
      retries: 5

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    container_name: candidates-pubsub
    ports:
      - "8085:8085"
    environment:
      PUBSUB_PROJECT_ID: test-project
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: candidates-api
    ports:
      - "8080:8080"
    env_file: .env
    command: ./api
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: candidates-worker
    env_file: .env
    command: ./worker
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
